generations:
  - name: "First Generation"
    start_year: 2010
    end_year: 2015
    description: "The original GMC Terrain was a mid-size crossover SUV that shared its platform with the Chevrolet Equinox but featured distinctive, squared-off styling with prominent fender flares and a bold front fascia. Built on GM's Theta platform, it was initially powered by either a 2.4L four-cylinder engine (182 hp) or a 3.0L V6 (264 hp), paired with a six-speed automatic transmission offering front-wheel or all-wheel drive. The interior was more upscale than its Chevrolet counterpart with higher quality materials and a premium design, particularly in the Denali trim introduced in 2013. A notable feature was the Multi-Flex fore/aft adjustable rear seat that could move nearly eight inches to prioritize either passenger or cargo space. Assembly took place in Ingersoll, Ontario at CAMI Assembly."

  - name: "First Generation (2016 Facelift)"
    start_year: 2016
    end_year: 2017
    description: "The 2016 facelift updated the first-generation Terrain with new front and rear fascias, chrome exhaust tips on all models (first used on 2013 Denali), a power dome hood, LED daytime running lights, new wheels, and a new gear selector. The 3.0L V6 was upgraded to a more powerful 3.6L V6 producing 301 hp. For 2017, the Nightfall edition was introduced with gloss-black finish replacing chrome on grille surround, fascia accents, mirror caps, and roof rack. Production ended in 2017 with this facelift representing the final version of the first generation."

  - name: "Second Generation"
    start_year: 2018
    end_year: 2021
    description: "The second-generation Terrain introduced for 2018 featured more car-like styling with a floating roof design, slimmer headlights, and C-shaped LED lighting accents on all trims. Built on the GM D2XX platform in San Luis Potosí, Mexico, it moved firmly into the compact crossover segment with reduced dimensions. Engine options included a 1.5L turbocharged I4 (170 hp), a 2.0L turbocharged I4 (252 hp), and a 1.6L turbodiesel I4 (137 hp). All models featured a folding front passenger seat to accommodate items up to eight feet long and a class-exclusive switch-based transmission shifter. Trim levels included SLE, SLT, and Denali (initially only with 2.0L engine). Standard features included a seven-inch infotainment touchscreen with Apple CarPlay and Android Auto, four USB ports, keyless entry, and drive mode selection."

  - name: "Second Generation (2022 Facelift)"
    start_year: 2022
    end_year: 2024
    description: "The refreshed second-generation Terrain debuted for 2022 with updated front and rear styling, exterior LED lamps, and interior improvements including an 11-inch driver information center. The low-end SL trim was discontinued. New AT4 trim introduced with rugged styling including a steel skid plate, black-painted wheels, off-road tires, and unique badging (AWD only). The diesel engine was discontinued after 2019 and the 2.0L engine after 2021, leaving only the 1.5L turbocharged I4 as the sole engine option from 2022 onward. For 2023, the 1.5L engine received an updated version with higher-pressure fuel system and slightly increased horsepower. The 2024 model year marked the final production year of this generation."

  - name: "Third Generation"
    start_year: 2025
    end_year: null
    description: "The third-generation GMC Terrain was unveiled on August 12, 2024, with production beginning October 14, 2024. This generation features a totally redesigned interior and exterior with a more rugged, truck-like appearance aligned with GMC's larger trucks. Key exterior features include C-shaped lighting signatures in the headlights and taillights, a grille design similar to GMC's trucks, standard 17-inch wheels (20-inch optional on Denali), and available two-tone paint. The redesigned interior includes an updated 15-inch infotainment screen, an 11-inch driver information center, and relocated steering column shifter. However, the previous generation's folding front passenger seat was discontinued. This generation rides on a slightly updated version of the Delta (D2XX) platform. The powertrain consists of a 1.5L turbocharged engine producing 174 horsepower and 184-203 lb-ft of torque, paired with a CVT (FWD) or 8-speed automatic transmission (AWD). Trim levels initially include Elevation with AWD, while AT4 and Denali became available for 2026 in AWD only."
