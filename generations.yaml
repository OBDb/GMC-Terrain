generations:
  - name: "First Generation"
    start_year: 2010
    end_year: 2017
    description: "The original GMC Terrain was a compact/mid-size crossover SUV that shared its platform with the Chevrolet Equinox but featured distinctive, squared-off styling with prominent fender flares and a bold front fascia. Initially powered by either a 2.4L four-cylinder engine or a 3.0L V6 (later upgraded to a 3.6L), it offered front-wheel or all-wheel drive configurations paired with a six-speed automatic transmission. The interior was more upscale than its Chevrolet counterpart, with higher quality materials and a premium design, particularly in the Denali trim introduced in 2013. Notable features included a sliding and reclining rear seat that could move nearly eight inches to prioritize either passenger or cargo space. A significant refresh in 2016 updated the styling and technology offerings. This generation established the Terrain as GMC's entry-level crossover with more rugged styling and premium positioning compared to its platform mate."

  - name: "Second Generation"
    start_year: 2018
    end_year: 2024
    description: "The second-generation Terrain introduced in 2018 featured more car-like styling with a floating roof design, slimmer headlights, and C-shaped lighting elements that align with GMC's design language. Significantly smaller than its predecessor, it moved firmly into the compact crossover segment. Engine options initially included 1.5L and 2.0L turbocharged four-cylinders plus a 1.6L turbodiesel (discontinued after 2019), all paired with advanced transmissions. The 2.0L engine was discontinued after 2020, leaving the 1.5L turbocharged as the sole gasoline option from 2021 onward. The interior offered a modern design with improved materials and technology, including a seven-inch infotainment touchscreen with Apple CarPlay and Android Auto compatibility, and a class-exclusive folding front passenger seat to accommodate items up to eight feet long. Trim levels included SLE, SLT, the premium Denali with distinctive styling, and the AT4 introduced in 2022 with rugged styling cues and off-road features. A refresh for 2022 updated the styling with an updated front and rear end, new exterior LED lamps, and enhanced technology. This generation refined the Terrain's position as a premium-positioned compact crossover emphasizing styling, technology, and interior quality."

  - name: "Third Generation"
    start_year: 2025
    end_year: null
    description: "The third-generation GMC Terrain was unveiled on August 12, 2024, with production beginning on October 14, 2024. This generation features a totally redesigned interior and exterior with a more rugged, truck-like appearance aligned with GMC's larger trucks. Key exterior features include C-shaped lighting signatures in the headlights and taillights, a grille design similar to GMC's trucks, standard 17-inch wheels, and available 20-inch wheels on Denali trims with optional two-tone paint. The redesigned interior includes an updated 15-inch infotainment screen, 11-inch driver information center, and relocated steering column shifter, while the previous generation's folding front passenger seat was discontinued. This generation rides on a slightly updated version of the Delta (D2XX) platform. The powertrain consists of a 1.5L turbocharged engine paired with either a continuously variable transmission (FWD) or 8-speed automatic transmission (AWD), producing 174 horsepower and 184-203 lb-ft of torque. Trim levels initially included Elevation with all-wheel drive, with AT4 and Denali becoming available for 2026 in all-wheel drive only."
